name: CI/CD Pipeline

on:
 push:
  branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
  
  
    - name: Verify Docker
      run: docker info


    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Build Backend
      run: |
        cd ne
        chmod +x mvnw
        ./mvnw clean package

    - name: Build backend Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest ./ne

    - name: Push backend Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/notes-backend:latest


    - name: Set up Node
      uses: actions/setup-node@v3
      with:
        node-version: '22.18.0'

    - name: Build frontend
      run: |
        cd notes-app
        npm install
        npm run build 

    - name: Build frontend Docker Image
      run:  docker build -t notes-frontend:latest ./notes-app

    - name: Push frontend Image
      run:  docker push ${{ secrets.DOCKER_USERNAME }}/notes-frontend:latest        

    - name: Set up Kubecofig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBECONFIG }}" | base64 --decode > $HOME/.kube/config
    - name: Test Kubernetes
      run: kubectl get pods

    - name: Deploy
      run: kubectl apply -f k8s/      